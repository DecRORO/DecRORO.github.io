<html lang="zh-CN"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>FF14装修模版 by RORO</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}
    body{
      background:#f5f5f5;
      color:#333;
    }

    .header{
      background:#fff;
      box-shadow:0 2px 10px #0000000d;
      padding:10px;
      position:sticky;
      top:0;
      z-index:100;
    }

    .container{max-width:1400px;margin:0 auto;padding:0 15px;}

    .head-title-wrap{
      display:flex;
      align-items:center;
      justify-content: space-between;
      width:100%;
      position:relative;
      margin-bottom:12px;
      min-height:40px;
    }
    .title{
      font-size:24px;
      font-weight:bold;
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%, -50%);
      text-align:center;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
    }

    .shop-btn{
      padding:12px 22px;
      font-size:16px;
      background:#ff3c00;
      color:#fff;
      border:none;
      border-radius:6px;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      flex-shrink:0;
    }

    .admin-top{
      display:flex;
      gap:8px;
      flex-shrink:0;
      position:relative;
      z-index:2;
    }

    a.admin-btn{
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      padding:12px 22px;
      font-size:16px;
      background:#4299e1;
      color:#fff;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .admin-btn{
      padding:12px 22px;
      font-size:16px;
      background:#4299e1;
      color:#fff;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }
    .exit-admin{background:#e74c3c;display:none;}

    .batch-panel{display:none;position:fixed;top:60px;right:15px;width:320px;background:#fff;padding:15px;box-shadow:0 3px 12px rgba(0,0,0,0.15);z-index:998;border-radius:6px;}
    .batch-panel select,.batch-panel textarea{width:100%;margin-bottom:8px;padding:6px;border:1px solid #eee;border-radius:3px;}
    .batch-panel button{width:100%;padding:8px;background:#27ae60;color:#fff;border:none;border-radius:3px;cursor:pointer;}
    .batch-position-group{display:flex;gap:10px;margin-bottom:8px;align-items:center;}
    .batch-position-group label{display:flex;align-items:center;gap:5px;font-size:14px;cursor:pointer;}

    .move-panel{display:none;position:fixed;bottom:15px;right:15px;width:340px;background:#fff;padding:15px;box-shadow:0 3px 12px #00000015;z-index:998;border-radius:6px;max-height:80vh;overflow-y:auto;}
    .move-panel select{width:100%;margin-bottom:8px;padding:6px;border:1px solid #eee;border-radius:3px;}
    .move-panel button{width:100%;padding:8px;margin-bottom:5px;border:none;color:#fff;border-radius:3px;cursor:pointer;}
    .move-panel .action-group{display:flex;gap:8px;margin-bottom:8px;}
    .move-panel .action-group button{width:50%;margin-bottom:0;}
    .move-panel .step-group{display:flex;gap:6px;margin-bottom:8px;align-items:center;flex-wrap:nowrap;justify-content:space-between;}
    .move-panel .step-group span{font-size:13px;color:#333;white-space:nowrap;}
    .move-panel .step-group input{width:55px;padding:6px 4px;border:1px solid #ddd;border-radius:3px;text-align:center;font-size:13px;}
    .move-panel .step-group button{width:auto;padding:6px 10px;margin-bottom:0;background:#3498db;font-size:12px;white-space:nowrap;}
    .move-panel .step-group button:last-child{background:#e67e22;}
    .move-panel .edge-group{display:flex;gap:8px;margin-bottom:8px;}
    .move-panel .edge-group button{width:50%;background:#9b59b6;}
    .move-panel .copy-link-group{display:flex;gap:8px;margin-bottom:8px;}
    .move-panel .copy-link-group button{width:100%;background:#1abc9c;}
    .move-panel .batch-note-group{display:flex;gap:8px;margin-bottom:8px;}
    .move-panel .batch-note-group button{width:50%;}
    .move-panel .batch-note-group button:first-child{background:#f39c12;}
    .move-panel .batch-note-group button:last-child{background:#e67e22;}
    .move-panel .select-group{display:flex;gap:8px;margin-bottom:8px;}
    .move-panel .select-group button{width:50%;background:#3498db;}
    .move-panel .select-group button:last-child{background:#999;}
    .move-panel .delete-group{display:flex;gap:8px;margin-bottom:8px;}
    .move-panel .delete-group button{width:50%;background:#e74c3c;}
    .move-panel .delete-group button:last-child{background:#c0392b;}
    #moveSelBtn{background:#27ae60}
    #copySelBtn{background:#f39c12}
    #moveToTopBtn{background:#9b59b6}
    #moveToBottomBtn{background:#9b59b6}
    #copyLinksBtn{background:#1abc9c}

    .gallery-item.dragging {
      opacity: 0.4;
    }
    .gallery-item.drag-over {
      transform: scale(1.02);
      outline: 3px solid #27ae60;
      outline-offset: 2px;
    }

    .main-filter-group{
      display:flex;
      justify-content:center;
      gap:12px;
      margin:16px 0;
      flex-wrap:wrap
    }
    .main-btn{
      padding:12px 28px;
      border:none;
      background:#fff;
      box-shadow:0 2px 6px #0000000d;
      font-size:16px;
      cursor:pointer;
      border-radius:5px;
      position:relative;
    }
    .main-btn.active{background:#4299e1;color:#fff}

    .yard-sub-group {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: -8px 0 16px 0;
      flex-wrap: wrap;
    }
    .yard-sub-btn {
      padding: 6px 20px;
      border: none;
      background: #e9ecef;
      font-size: 14px;
      cursor: pointer;
      border-radius: 30px;
      transition: all 0.2s;
    }
    .yard-sub-btn.active {
      background: #2c7da0;
      color: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .yard-sub-btn.admin-mode {
      background: #cbd5e0;
    }

    .style-layout-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
      flex-wrap:wrap;
    }

    .style-select-wrap{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:14px;
    }
    .style-select-wrap label{
      font-weight:500;
      color:#333;
    }
    .style-select{
      padding:8px 12px;
      border-radius:5px;
      border:1px solid #ddd;
      font-size:14px;
      background:#fff;
    }

    .layout-group{
      display:flex;
      gap:8px;
      align-items:center;
      flex-shrink:0;
    }
    .layout-label{font-size:14px;color:#333;margin-right:2px;font-weight:500;}
    .btn{padding:8px 10px;border:none;background:#fff;box-shadow:0 2px 4px #00000008;cursor:pointer;font-size:14px;border-radius:3px;}
    .btn.active{background:#4299e1;color:#fff}

    .gallery{
      display:grid;
      gap:8px;
      margin-top:20px;
      transition: all 0.3s ease;
    }
    .gallery.grid-9{
      grid-template-columns:repeat(3,1fr);
    }
    .gallery.grid-9 .gallery-item{
      aspect-ratio:1/1;
    }
    .gallery.grid-4{
      grid-template-columns:repeat(2,1fr);
    }
    .gallery.grid-4 .gallery-item{
      aspect-ratio:16/9 !important;
    }
    .gallery.grid-1{
      grid-template-columns:1fr;
    }
    .gallery.grid-1 .gallery-item{
      aspect-ratio:16/9 !important;
    }

    .gallery-item{
      overflow:hidden;
      position:relative;
      cursor: pointer;
      transition: transform 0.1s ease, outline 0.1s ease;
      user-select: none;
      background:#f5f5f5;
    }

    .gallery-item img{
      width:100%;
      height:100%;
      object-fit:cover;
      pointer-events: none;
    }

    .gallery-item .check-box{
      position:absolute;
      top:8px;
      left:8px;
      width:22px;
      height:22px;
      display:none;
      z-index:10;
      pointer-events: none;
    }
    .gallery-item.show-check .check-box{display:block}
    .gallery-item.checked{outline:4px solid #27ae60}

    .note-btn{
      position:absolute;
      top:8px;
      right:8px;
      width:28px;
      height:28px;
      background:rgba(0,0,0,0.65);
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#ffd966;
      font-size:12px;
      cursor:pointer;
      z-index:10;
      opacity:0;
      transition:opacity 0.2s;
      pointer-events: auto;
    }
    .note-btn-bottom{
      position:absolute;
      bottom:8px;
      left:8px;
      width:28px;
      height:28px;
      background:rgba(0,0,0,0.65);
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#ffd966;
      font-size:12px;
      cursor:pointer;
      z-index:10;
      opacity:0;
      transition:opacity 0.2s;
      pointer-events: auto;
    }
    .gallery-item.show-check .note-btn,
    .gallery-item.show-check .note-btn-bottom{
      opacity:1;
    }
    .note-btn:hover, .note-btn-bottom:hover{
      background:rgba(0,0,0,0.85);
      transform:scale(1.05);
    }

    .note-display{
      position:absolute;
      top:0;
      right:0;
      background:rgba(0,0,0,0.8);
      backdrop-filter:blur(4px);
      color:#fff;
      font-size:26px;
      font-weight:600;
      padding:8px 14px;
      border-radius:4px;
      word-wrap:break-word;
      white-space:normal;
      max-width:70%;
      text-align:center;
      z-index:9;
      pointer-events:none;
      line-height:1.3;
    }
    .note-display-bottom{
      position:absolute;
      bottom:0;
      left:0;
      background:rgba(0,0,0,0.8);
      backdrop-filter:blur(4px);
      color:#fff;
      font-size:26px;
      font-weight:600;
      padding:8px 14px;
      border-radius:4px;
      word-wrap:break-word;
      white-space:normal;
      max-width:70%;
      text-align:center;
      z-index:9;
      pointer-events:none;
      line-height:1.3;
    }

    .drag-handle{
      position:absolute;
      bottom:12px;
      right:12px;
      width:40px;
      height:40px;
      background:rgba(0,0,0,0.7);
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-size:18px;
      cursor: grab;
      z-index:10;
      opacity:0;
      transition:opacity 0.2s;
      pointer-events: auto;
    }
    .gallery-item.show-check .drag-handle{
      opacity:1;
    }
    .drag-handle:active{
      cursor: grabbing;
    }
    .drag-handle:hover{
      background:rgba(0,0,0,0.9);
      transform:scale(1.05);
    }

    .lightbox{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.95);
      z-index:9999;
      opacity:0;
      pointer-events:none;
      transition:0.3s ease;
      overflow:hidden;
    }
    .lightbox.show{
      opacity:1;
      pointer-events:auto;
    }
    .lightbox-container{
      position:relative;
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }
    .lightbox-backdrop{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      z-index:1;
    }
    .lightbox-img{
      position:relative;
      z-index:10;
      max-width:90%;
      max-height:85vh;
      transform-origin:center center;
      will-change:transform;
      cursor:zoom-in;
    }
    .lightbox-close{
      position:absolute;
      top:20px;
      right:20px;
      color:#fff;
      font-size:28px;
      width:44px;
      height:44px;
      background:rgba(0,0,0,0.5);
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      z-index:20;
      backdrop-filter:blur(4px);
    }
    .lightbox-close:hover{
      background:rgba(0,0,0,0.8);
    }
    .zoom-tip{
      position:absolute;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,0.6);
      color:#fff;
      font-size:12px;
      padding:6px 12px;
      border-radius:20px;
      pointer-events:none;
      z-index:20;
      white-space:nowrap;
      transition:opacity 0.3s;
    }

    .swipe-btn-group{
      display:none;
      position:absolute;
      bottom: 120px;
      left:0;
      right:0;
      justify-content:space-between;
      padding:0 20px;
      z-index:15;
    }
    .swipe-btn{
      width:50px;
      height:50px;
      border-radius:50%;
      background:rgba(0,0,0,0.5);
      border:none;
      color:#fff;
      font-size:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      backdrop-filter:blur(4px);
      cursor:pointer;
      z-index:15;
    }
    .swipe-btn:hover{
      background:rgba(0,0,0,0.8);
    }

    .cat-edit-btn{margin-left:6px;padding:2px 5px;background:#f1c40f;border:none;font-size:11px;border-radius:2px;color:#fff;cursor:pointer;}
    .cat-del-btn{margin-left:3px;padding:2px 5px;background:#e74c3f;color:#fff;border:none;font-size:11px;border-radius:2px;cursor:pointer;}

    .add-cat-bar{display:flex;gap:6px;justify-content:center;margin:8px 0;display:none;flex-wrap:wrap;}
    .add-cat-bar input{padding:5px 7px;border:1px solid #ddd;border-radius:3px;}
    .add-cat-bar button{padding:5px 8px;background:#27ae60;color:#fff;border:none;border-radius:3px;cursor:pointer;}

    .save-tip{position:fixed;bottom:15px;left:15px;background:#27ae60;color:#fff;padding:6px 10px;border-radius:3px;display:none;z-index:9997;font-size:12px;}

    @media (max-width:768px){
      html,body{height:auto;}
      .container{padding:0 6px;}
      .header{padding:6px;}
      .head-title-wrap{margin-bottom:0;min-height:36px;padding-top:4px;}
      .title{font-size:16px;}
      .shop-btn{padding:5px 10px;font-size:12px;}
      .admin-top{margin-top:3px !important;}
      a.admin-btn, .admin-btn{padding:5px 10px;font-size:12px;}
      .swipe-btn-group{display:flex;bottom:80px;}
      .main-filter-group{gap:6px;margin:8px 0;}
      .main-btn{padding:5px 12px;font-size:13px;}
      .yard-sub-group{gap:8px; margin:-4px 0 12px 0;}
      .yard-sub-btn{padding:4px 12px; font-size:12px;}
      .style-layout-row{gap:8px;margin-bottom:8px;flex-wrap:wrap;}
      .style-select-wrap{gap:6px;font-size:13px;flex-shrink:0;}
      .style-select{padding:7px 10px;font-size:13px;}
      .layout-group{gap:5px;margin-left:auto;}
      .layout-label{font-size:12px;}
      .layout-group .btn{padding:7px 12px;font-size:12px;}
      .gallery{gap:4px;margin-top:6px;}
      .drag-handle{width:36px;height:36px;font-size:16px;bottom:8px;right:8px;}
      .note-btn, .note-btn-bottom{width:26px;height:26px;font-size:11px;}
      .note-display, .note-display-bottom{font-size:13px;padding:4px 8px;}
      .lightbox-img{max-width:95%;max-height:75vh;}
      .move-panel{width:300px;right:10px;bottom:10px;}
      .move-panel .step-group input{width:50px;}
      .move-panel .step-group button{padding:6px 8px;font-size:11px;}
    }
  </style>
</head>

<script>
(function() {
  const CONFIG = { PASSWORD: "qq979485482" };
  let isAdmin = false;
  let imgList = [];
  let nowMain = "s";
  let nowSub = "all";
  let yardSubType = null;
  
  let checkedGlobalIndices = [];
  let currentLightIndex = 0;
  let dragSourceGlobalIdx = null;
  
  let currentScale = 1;
  let currentTranslateX = 0;
  let currentTranslateY = 0;
  let startTouchX = 0;
  let startTouchY = 0;
  let isSwiping = false;
  let swipeThreshold = 50;
  
  let initialPinchDistance = 0;
  let initialPinchScale = 1;
  let initialPinchTranslateX = 0;
  let initialPinchTranslateY = 0;
  
  const DRAG_SENSITIVITY = 0.25;
  
  const dom = {
    saveTip: document.getElementById('saveTip'), gallery: document.getElementById('gallery'),
    lightbox: document.getElementById('lightbox'), lightboxImg: document.getElementById('lightbox-img'),
    lightboxContainer: document.getElementById('lightboxContainer'),
    lightboxBackdrop: document.getElementById('lightboxBackdrop'),
    lightboxClose: document.querySelector('.lightbox-close'), prevBtn: document.getElementById('prevBtn'),
    nextBtn: document.getElementById('nextBtn'), zoomTip: document.getElementById('zoomTip'),
    exitAdmin: document.getElementById('exitAdmin'), viewBtn: document.getElementById('viewBtn'),
    batchPanel: document.getElementById('batchPanel'), movePanel: document.getElementById('movePanel'),
    addCatBar: document.getElementById('addCatBar'), batchMain: document.getElementById('batchMain'),
    batchSub: document.getElementById('batchSub'), batchUrls: document.getElementById('batchUrls'),
    batchAddBtn: document.getElementById('batchAddBtn'), moveMain: document.getElementById('moveMain'),
    moveSub: document.getElementById('moveSub'), selectAllBtn: document.getElementById('selectAllBtn'),
    moveSelBtn: document.getElementById('moveSelBtn'), copySelBtn: document.getElementById('copySelBtn'),
    delSelBtn: document.getElementById('delSelBtn'), cancelCheck: document.getElementById('cancelCheck'),
    styleSelect: document.getElementById('styleSelect'), mainCatGroup: document.getElementById('mainCatGroup'),
    siteTitle: document.getElementById('siteTitle'), doAddMain: document.getElementById('doAddMain'),
    doAddSub: document.getElementById('doAddSub'), newMainVal: document.getElementById('newMainVal'),
    newMainText: document.getElementById('newMainText'), newSubVal: document.getElementById('newSubVal'),
    newSubText: document.getElementById('newSubText'), yardSubBar: document.getElementById('yardSubBar'),
    stepCount: document.getElementById('stepCount'),
    moveForwardBtn: document.getElementById('moveForwardBtn'),
    moveBackwardBtn: document.getElementById('moveBackwardBtn'),
    moveToTopBtn: document.getElementById('moveToTopBtn'),
    moveToBottomBtn: document.getElementById('moveToBottomBtn'),
    copyLinksBtn: document.getElementById('copyLinksBtn'),
    deleteAllBtn: document.getElementById('deleteAllBtn'),
    batchNoteTopBtn: document.getElementById('batchNoteTopBtn'),
    batchNoteBottomBtn: document.getElementById('batchNoteBottomBtn')
  };

  function showTip(msg) { if(dom.saveTip){ dom.saveTip.textContent=msg||"已保存"; dom.saveTip.style.display="block"; setTimeout(()=>{ if(dom.saveTip) dom.saveTip.style.display="none"; },1500); } }

  function loadData() { imgList = JSON.parse(JSON.stringify(window.EMBEDDED_DATA || [])); imgList.forEach(item=>{ if(item.note===undefined) item.note=""; if(item.noteBottom===undefined) item.noteBottom=""; }); }

  function saveAndExport() {
    if(dom.saveTip) dom.saveTip.style.display="none";
    let htmlContent = document.documentElement.outerHTML;
    const exportData = JSON.parse(JSON.stringify(imgList));
    const embeddedDataScript = `<script>window.EMBEDDED_DATA = ${JSON.stringify(exportData)};<\/script>`;
    htmlContent = htmlContent.replace(/<script>window\.EMBEDDED_DATA\s*=\s*\[.*?\];?<\/script>/gi, '');
    htmlContent = htmlContent.replace(/<body[^>]*>/, match => match + embeddedDataScript);
    htmlContent = htmlContent.replace(/localStorage\.(getItem|setItem|removeItem)/g, '// localStorage.$1');
    htmlContent = htmlContent.replace(/<div class="save-tip"[^>]*style="display:\s*block"[^>]*>/, '<div class="save-tip" id="saveTip" style="display: none;">');
    const blob = new Blob([htmlContent], { type: "text/html" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "FF14装修模版.html";
    a.click();
    URL.revokeObjectURL(a.href);
    showTip("✓ 已保存并导出HTML文件，包含所有图片");
  }

  function exitAdminMode() {
    isAdmin = false; checkedGlobalIndices = [];
    if(dom.viewBtn) dom.viewBtn.style.display="inline-block";
    if(dom.exitAdmin) dom.exitAdmin.style.display="none";
    if(dom.batchPanel) dom.batchPanel.style.display="none";
    if(dom.movePanel) dom.movePanel.style.display="none";
    if(dom.addCatBar) dom.addCatBar.style.display="none";
    document.querySelectorAll(".cat-edit-btn,.cat-del-btn").forEach(el=>el.remove());
    document.querySelectorAll(".yard-sub-btn").forEach(btn=>btn.classList.remove("admin-mode"));
    render();
    saveAndExport();
  }

  function getCurrentFilteredList() {
    let filtered = imgList.filter(item => {
      if (item.main !== nowMain) return false;
      if (nowMain === 'yard' && yardSubType !== null) {
        return item.sub === yardSubType;
      }
      if (nowSub === "all") {
        return item.sub === "all";
      }
      return item.sub === nowSub;
    });
    return filtered;
  }
  
  function getCurrentFilteredGlobalIndices() {
    const indices = [];
    imgList.forEach((item, idx) => {
      if (item.main !== nowMain) return;
      if (nowMain === 'yard' && yardSubType !== null) {
        if (item.sub === yardSubType) indices.push(idx);
      } else if (nowSub === "all") {
        if (item.sub === "all") indices.push(idx);
      } else if (item.sub === nowSub) {
        indices.push(idx);
      }
    });
    return indices;
  }

  function toggleCheck(globalIdx) { let p=checkedGlobalIndices.indexOf(globalIdx); if(p===-1) checkedGlobalIndices.push(globalIdx); else checkedGlobalIndices.splice(p,1); render(); }
  
  function syncNoteToSameSrc(globalIdx, position, newNote) {
    const targetImg = imgList[globalIdx];
    if (!targetImg) return;
    const targetSrc = targetImg.src;
    for (let i = 0; i < imgList.length; i++) {
      if (i !== globalIdx && imgList[i].src === targetSrc) {
        if (position === 'top') imgList[i].note = newNote;
        else imgList[i].noteBottom = newNote;
      }
    }
  }
  
  function editNote(globalIdx, pos){ 
    let cur = pos==='top' ? (imgList[globalIdx]?.note || "") : (imgList[globalIdx]?.noteBottom || "");
    let newNote = prompt(`备注内容:`, cur); 
    if(newNote !== null){ 
      if(pos==='top') imgList[globalIdx].note = newNote.trim(); 
      else imgList[globalIdx].noteBottom = newNote.trim(); 
      syncNoteToSameSrc(globalIdx, pos, newNote.trim());
      render(); 
      showTip("备注已保存并同步"); 
    } 
  }
  
  function swapImages(a,b){ if(a===b) return false; let tmp=imgList[a]; imgList[a]=imgList[b]; imgList[b]=tmp; return true; }
  
  function resetZoom() {
    if (dom.lightboxImg) {
      dom.lightboxImg.style.transform = `translate(0px, 0px) scale(1)`;
      currentScale = 1;
      currentTranslateX = 0;
      currentTranslateY = 0;
    }
  }

  function getDistance(touches) {
    if (touches.length < 2) return 0;
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }

  function switchImage(direction) {
    const list = getCurrentFilteredList();
    if (!list.length) return;
    let newIndex = currentLightIndex + direction;
    if (newIndex < 0) newIndex = list.length - 1;
    if (newIndex >= list.length) newIndex = 0;
    currentLightIndex = newIndex;
    dom.lightboxImg.src = list[currentLightIndex].src;
    resetZoom();
  }

  function closeLightbox() {
    if (dom.lightbox) dom.lightbox.classList.remove("show");
    resetZoom();
  }

  function initLightboxEvents() {
    if (!dom.lightboxImg) return;
    let lastTouchX = 0, lastTouchY = 0, isPinching = false, isDragging = false;
    if (dom.lightboxBackdrop) dom.lightboxBackdrop.onclick = (e) => { e.stopPropagation(); closeLightbox(); };
    dom.lightboxImg.onclick = (e) => e.stopPropagation();
    dom.lightboxImg.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        e.preventDefault();
        isPinching = true;
        isSwiping = false;
        isDragging = false;
        initialPinchDistance = getDistance(e.touches);
        initialPinchScale = currentScale;
        initialPinchTranslateX = currentTranslateX;
        initialPinchTranslateY = currentTranslateY;
      } else if (e.touches.length === 1) {
        if (currentScale <= 1.05) {
          isPinching = false; isSwiping = true; isDragging = false;
          startTouchX = e.touches[0].clientX;
          startTouchY = e.touches[0].clientY;
        } else {
          isPinching = false; isSwiping = false; isDragging = true;
          lastTouchX = e.touches[0].clientX;
          lastTouchY = e.touches[0].clientY;
        }
      }
    });
    dom.lightboxImg.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2 && isPinching) {
        e.preventDefault();
        const newDistance = getDistance(e.touches);
        if (initialPinchDistance > 0) {
          let newScale = initialPinchScale * (newDistance / initialPinchDistance);
          newScale = Math.min(Math.max(newScale, 1), 3);
          if (newScale !== currentScale) {
            currentScale = newScale;
            dom.lightboxImg.style.transform = `translate(0px, 0px) scale(${currentScale})`;
            currentTranslateX = 0; currentTranslateY = 0;
          }
        }
      } else if (e.touches.length === 1 && isDragging && currentScale > 1.05) {
        e.preventDefault();
        let dx = (e.touches[0].clientX - lastTouchX) * DRAG_SENSITIVITY;
        let dy = (e.touches[0].clientY - lastTouchY) * DRAG_SENSITIVITY;
        if (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) {
          currentTranslateX += dx; currentTranslateY += dy;
          currentTranslateX = Math.min(Math.max(currentTranslateX, -500), 500);
          currentTranslateY = Math.min(Math.max(currentTranslateY, -600), 600);
          dom.lightboxImg.style.transform = `translate(${currentTranslateX}px, ${currentTranslateY}px) scale(${currentScale})`;
        }
        lastTouchX = e.touches[0].clientX;
        lastTouchY = e.touches[0].clientY;
      } else if (e.touches.length === 1 && isSwiping && currentScale <= 1.05) e.preventDefault();
    });
    dom.lightboxImg.addEventListener('touchend', (e) => {
      if (isPinching) {
        isPinching = false; initialPinchDistance = 0;
        if (currentScale < 1.05) resetZoom();
        if (dom.zoomTip) { dom.zoomTip.style.opacity = '0.7'; setTimeout(() => { if(dom.zoomTip) dom.zoomTip.style.opacity = '0'; }, 2000); }
      } else if (isSwiping && currentScale <= 1.05) {
        const endTouchX = e.changedTouches[0].clientX;
        const deltaX = endTouchX - startTouchX;
        if (Math.abs(deltaX) > swipeThreshold) deltaX > 0 ? switchImage(-1) : switchImage(1);
        isSwiping = false;
      }
      isDragging = false; lastTouchX = 0; lastTouchY = 0;
    });
    dom.lightboxImg.addEventListener('dblclick', (e) => { e.preventDefault(); resetZoom(); });
  }

  function openLightbox(src) {
    if (dom.lightboxImg) {
      resetZoom();
      dom.lightboxImg.src = src;
      dom.lightbox.classList.add("show");
      initLightboxEvents();
      if (dom.zoomTip) { dom.zoomTip.style.opacity = '0.7'; setTimeout(() => { if(dom.zoomTip) dom.zoomTip.style.opacity = '0'; }, 3000); }
    }
  }
  
  function syncSelects() {
    const mainBtns = [...document.querySelectorAll("#mainCatGroup .main-btn")];
    const mainOptions = mainBtns.map(btn => `<option value="${btn.dataset.val}">${btn.textContent}</option>`).join("");
    if(dom.moveMain) dom.moveMain.innerHTML = mainOptions;
    if(dom.batchMain) dom.batchMain.innerHTML = mainOptions;
    const normalOptions = [
      {val:"all", name:"总览"}, {val:"modern", name:"现代居家"}, {val:"japan", name:"日系和风"},
      {val:"classic-forest", name:"古典森系幻想"}, {val:"rp-shop", name:"商铺&夜店"},
      {val:"space", name:"异空间&影棚"}, {val:"multi-layer", name:"多层"}
    ];
    const yardSizeOptions = [{val:"small", name:"小"},{val:"medium", name:"中"},{val:"large", name:"大"}];
    const allSubOptions = [...normalOptions, ...yardSizeOptions];
    const optionHtml = allSubOptions.map(opt => `<option value="${opt.val}">${opt.name}</option>`).join("");
    if(dom.moveSub) dom.moveSub.innerHTML = optionHtml;
    if(dom.batchSub) dom.batchSub.innerHTML = optionHtml;
    if(dom.styleSelect) {
      const currentVal = dom.styleSelect.value;
      dom.styleSelect.innerHTML = normalOptions.map(opt => `<option value="${opt.val}" ${opt.val === currentVal ? 'selected' : ''}>${opt.name}</option>`).join("");
    }
  }
  
  function enableEdit() {
    document.querySelectorAll(".cat-edit-btn,.cat-del-btn").forEach(el=>el.remove());
    document.querySelectorAll("#mainCatGroup .main-btn").forEach(btn=>{
      const editBtn=document.createElement("button"); editBtn.className="cat-edit-btn"; editBtn.textContent="改";
      const delBtn=document.createElement("button"); delBtn.className="cat-del-btn"; delBtn.textContent="删";
      btn.appendChild(editBtn); btn.appendChild(delBtn);
      editBtn.onclick=(e)=>{ e.stopPropagation(); let cur=btn.firstChild?.textContent?.trim()||btn.textContent.replace(/[改删]/g,'').trim(); let newTxt=prompt("新名称",cur); if(newTxt && btn.firstChild) btn.firstChild.textContent=newTxt; syncSelects(); showTip("分类改名"); };
      delBtn.onclick=(e)=>{ e.stopPropagation(); if(!confirm("删除分类？")) return; let val=btn.dataset.val; imgList=imgList.filter(x=>x.main!==val); btn.remove(); if(nowMain===val) { nowMain=document.querySelector("#mainCatGroup .main-btn")?.dataset.val||"s"; yardSubType=null; } syncSelects(); render(); showTip("已删除分类"); };
    });
    if(dom.addCatBar) dom.addCatBar.style.display="flex";
    document.querySelectorAll(".yard-sub-btn").forEach(btn=>btn.classList.add("admin-mode"));
  }
  
  function batchAddImages() {
    const m = dom.batchMain.value;
    const s = dom.batchSub.value;
    const urls = dom.batchUrls.value.trim().split("\n").filter(u=>u.trim());
    if(!urls.length){ alert("请粘贴图片链接"); return; }
    const startRadio = document.querySelector('input[name="batchPosition"]:checked')?.value === 'start';
    const newImgs = urls.map(u=>({src:u.trim(), main:m, sub:s, note:"", noteBottom:""}));
    if(startRadio) imgList.unshift(...newImgs); else imgList.push(...newImgs);
    render(); dom.batchUrls.value=""; showTip(`✓ 已添加 ${newImgs.length} 张`);
  }
  
  function batchNote(position) {
    if (!checkedGlobalIndices.length) { alert("请先勾选图片"); return; }
    const posName = position === 'top' ? '右上角' : '左下角';
    const noteText = prompt(`请输入要设置的${posName}备注内容（留空可清空备注）:`);
    if (noteText === null) return;
    const trimmedNote = noteText.trim();
    const processedSrcs = new Set();
    for (let globalIdx of checkedGlobalIndices) {
      const img = imgList[globalIdx];
      if (img && !processedSrcs.has(img.src)) {
        processedSrcs.add(img.src);
        for (let i = 0; i < imgList.length; i++) {
          if (imgList[i].src === img.src) {
            if (position === 'top') imgList[i].note = trimmedNote;
            else imgList[i].noteBottom = trimmedNote;
          }
        }
      }
    }
    render();
    showTip(`✓ 已为 ${checkedGlobalIndices.length} 张图片设置${posName}备注（已同步相同图片）`);
  }
  
  function copySelectedLinks() {
    if (!checkedGlobalIndices.length) { alert("请先勾选图片"); return; }
    const globalIndices = getCurrentFilteredGlobalIndices();
    const globalIdxToItem = new Map();
    imgList.forEach((item, idx) => globalIdxToItem.set(idx, item));
    const links = [];
    for (let i = 0; i < globalIndices.length; i++) {
      const globalIdx = globalIndices[i];
      if (checkedGlobalIndices.includes(globalIdx)) {
        const item = globalIdxToItem.get(globalIdx);
        if (item && item.src) links.push(item.src);
      }
    }
    if (links.length === 0) { alert("未找到选中图片的链接"); return; }
    const linksText = links.join("\n");
    navigator.clipboard.writeText(linksText).then(() => showTip(`✓ 已复制 ${links.length} 个图片链接到剪贴板（按当前显示顺序）`))
      .catch(() => { const textarea = document.createElement("textarea"); textarea.value = linksText; document.body.appendChild(textarea); textarea.select(); document.execCommand("copy"); document.body.removeChild(textarea); showTip(`✓ 已复制 ${links.length} 个图片链接到剪贴板（按当前显示顺序）`); });
  }
  
  function moveSelectedImages() {
    if(!checkedGlobalIndices.length){ alert("请先勾选图片"); return; }
    const m = dom.moveMain.value;
    const s = dom.moveSub.value;
    checkedGlobalIndices.forEach(idx=>{ if(imgList[idx]){ imgList[idx].main=m; imgList[idx].sub=s; } });
    checkedGlobalIndices = [];
    render(); showTip(`✓ 移动完成`);
  }
  
  function copySelectedImages() {
    if(!checkedGlobalIndices.length){ alert("请先勾选图片"); return; }
    const m = dom.moveMain.value;
    const s = dom.moveSub.value;
    const copies = checkedGlobalIndices.map(idx=>({ ...imgList[idx], main:m, sub:s }));
    imgList.push(...copies);
    checkedGlobalIndices = [];
    render(); showTip(`✓ 复制了${copies.length}张`);
  }
  
  function delSelectedImages() {
    if(!checkedGlobalIndices.length) { alert("未选择图片"); return; }
    if(!confirm(`删除${checkedGlobalIndices.length}张图片？`)) return;
    imgList = imgList.filter((_,i)=>!checkedGlobalIndices.includes(i));
    checkedGlobalIndices = [];
    render(); showTip("✓ 已删除");
  }
  
  function deleteAllImages() {
    if(!imgList.length) { alert("当前没有图片可删除"); return; }
    if(!confirm(`确定删除全部 ${imgList.length} 张图片吗？此操作不可撤销！`)) return;
    imgList = [];
    checkedGlobalIndices = [];
    render();
    showTip(`✓ 已删除全部图片`);
  }
  
  function moveForward() {
    if(!checkedGlobalIndices.length){ alert("请先勾选图片"); return; }
    let step = parseInt(dom.stepCount.value) || 1;
    if(step < 1) step = 1;
    let sorted = [...checkedGlobalIndices].sort((a,b)=>a-b);
    for (let idx of sorted) {
      let newPos = idx - step;
      if (newPos < 0) newPos = 0;
      if (newPos !== idx) {
        let [item] = imgList.splice(idx, 1);
        imgList.splice(newPos, 0, item);
      }
    }
    checkedGlobalIndices = [];
    render();
    showTip(`✓ 已向前移动 ${sorted.length} 张图片`);
  }
  
  function moveBackward() {
    if(!checkedGlobalIndices.length){ alert("请先勾选图片"); return; }
    let step = parseInt(dom.stepCount.value) || 1;
    if(step < 1) step = 1;
    let sorted = [...checkedGlobalIndices].sort((a,b)=>b-a);
    for (let idx of sorted) {
      let newPos = idx + step;
      if (newPos >= imgList.length) newPos = imgList.length - 1;
      if (newPos !== idx) {
        let [item] = imgList.splice(idx, 1);
        imgList.splice(newPos, 0, item);
      }
    }
    checkedGlobalIndices = [];
    render();
    showTip(`✓ 已向后移动 ${sorted.length} 张图片`);
  }
  
  function moveToTop() {
    if(!checkedGlobalIndices.length){ alert("请先勾选图片"); return; }
    let items = [];
    let remainingIndices = [...checkedGlobalIndices].sort((a,b)=>b-a);
    for (let idx of remainingIndices) { items.unshift(imgList[idx]); imgList.splice(idx, 1); }
    imgList.unshift(...items);
    checkedGlobalIndices = [];
    render();
    showTip(`✓ 已将 ${items.length} 张图片置顶`);
  }
  
  function moveToBottom() {
    if(!checkedGlobalIndices.length){ alert("请先勾选图片"); return; }
    let items = [];
    let remainingIndices = [...checkedGlobalIndices].sort((a,b)=>b-a);
    for (let idx of remainingIndices) { items.push(imgList[idx]); imgList.splice(idx, 1); }
    imgList.push(...items);
    checkedGlobalIndices = [];
    render();
    showTip(`✓ 已将 ${items.length} 张图片置底`);
  }
  
  function updateYardSubBarVisibility() {
    if(dom.yardSubBar) { if(nowMain === 'yard') dom.yardSubBar.style.display = "flex"; else dom.yardSubBar.style.display = "none"; }
    if(nowMain !== 'yard') yardSubType = null;
    document.querySelectorAll(".yard-sub-btn").forEach(btn=>{
      const subVal = btn.getAttribute("data-yard-sub");
      if(nowMain === 'yard' && yardSubType === subVal) btn.classList.add("active");
      else btn.classList.remove("active");
    });
    render();
  }
  
  function render() {
    if(!dom.gallery) return;
    dom.gallery.innerHTML = "";
    const list = getCurrentFilteredList();
    const globalIndices = getCurrentFilteredGlobalIndices();
    list.forEach((it, displayIdx) => {
      const globalIdx = globalIndices[displayIdx];
      const d = document.createElement("div"); d.className = "gallery-item"; d.setAttribute("data-global-idx", globalIdx);
      if(isAdmin) d.classList.add("show-check");
      if(checkedGlobalIndices.includes(globalIdx)) d.classList.add("checked");
      const cb = document.createElement("input"); cb.type = "checkbox"; cb.className = "check-box"; cb.checked = checkedGlobalIndices.includes(globalIdx);
      const img = document.createElement("img"); img.src = it.src; img.alt = "装修模板图片"; img.loading = "lazy";
      d.appendChild(cb); d.appendChild(img);
      if(it.note?.trim()){ let nd=document.createElement("div"); nd.className="note-display"; nd.textContent=it.note; d.appendChild(nd); }
      if(it.noteBottom?.trim()){ let ndb=document.createElement("div"); ndb.className="note-display-bottom"; ndb.textContent=it.noteBottom; d.appendChild(ndb); }
      if(isAdmin){
        const noteBtn=document.createElement("div"); noteBtn.className="note-btn"; noteBtn.innerHTML='<i class="fas fa-pen"></i>'; noteBtn.onclick=(e)=>{ e.stopPropagation(); editNote(globalIdx,'top'); }; d.appendChild(noteBtn);
        const noteBtnB=document.createElement("div"); noteBtnB.className="note-btn-bottom"; noteBtnB.innerHTML='<i class="fas fa-pen"></i>'; noteBtnB.onclick=(e)=>{ e.stopPropagation(); editNote(globalIdx,'bottom'); }; d.appendChild(noteBtnB);
        const dragHandle=document.createElement("div"); dragHandle.className="drag-handle"; dragHandle.innerHTML='<i class="fas fa-grip-vertical"></i>'; dragHandle.setAttribute("draggable","true");
        dragHandle.addEventListener('dragstart',(e)=>{ dragSourceGlobalIdx=globalIdx; e.dataTransfer.effectAllowed='move'; d.classList.add('dragging'); });
        dragHandle.addEventListener('dragend',()=>{ d.classList.remove('dragging'); dragSourceGlobalIdx=null; document.querySelectorAll('.gallery-item').forEach(el=>el.classList.remove('drag-over')); });
        d.addEventListener('dragover',e=>e.preventDefault());
        d.addEventListener('dragenter',e=>{ if(dragSourceGlobalIdx!==null && dragSourceGlobalIdx!==globalIdx) d.classList.add('drag-over'); });
        d.addEventListener('dragleave',()=>d.classList.remove('drag-over'));
        d.addEventListener('drop',e=>{ e.preventDefault(); d.classList.remove('drag-over'); if(dragSourceGlobalIdx!==null && dragSourceGlobalIdx!==globalIdx){ swapImages(dragSourceGlobalIdx,globalIdx); render(); showTip('排序已更新'); } dragSourceGlobalIdx=null; });
        d.appendChild(dragHandle);
        d.addEventListener('click',(e)=>{ if(e.target===dragHandle||dragHandle.contains(e.target)||e.target===noteBtn||noteBtn.contains(e.target)||e.target===noteBtnB||noteBtnB.contains(e.target)) return; toggleCheck(globalIdx); });
      } else {
        d.addEventListener('click',()=>{ currentLightIndex=displayIdx; openLightbox(it.src); });
      }
      dom.gallery.appendChild(d);
    });
  }
  
  function bindEvents() {
    if(dom.siteTitle){
      dom.siteTitle.ondblclick=()=>{
        if(isAdmin) return;
        let pwd=prompt("管理密码");
        if(pwd!==CONFIG.PASSWORD){ alert("错误"); return; }
        isAdmin=true; checkedGlobalIndices=[]; if(dom.viewBtn) dom.viewBtn.style.display="none"; if(dom.exitAdmin) dom.exitAdmin.style.display="inline-block"; if(dom.batchPanel) dom.batchPanel.style.display="block"; if(dom.movePanel) dom.movePanel.style.display="block"; enableEdit(); render(); updateYardSubBarVisibility();
      };
    }
    if(dom.exitAdmin) dom.exitAdmin.onclick=exitAdminMode;
    if(dom.batchAddBtn) dom.batchAddBtn.onclick=batchAddImages;
    if(dom.selectAllBtn) dom.selectAllBtn.onclick=()=>{ checkedGlobalIndices=getCurrentFilteredGlobalIndices(); render(); };
    if(dom.moveSelBtn) dom.moveSelBtn.onclick=moveSelectedImages;
    if(dom.copySelBtn) dom.copySelBtn.onclick=copySelectedImages;
    if(dom.delSelBtn) dom.delSelBtn.onclick=delSelectedImages;
    if(dom.cancelCheck) dom.cancelCheck.onclick=()=>{ checkedGlobalIndices=[]; render(); };
    if(dom.copyLinksBtn) dom.copyLinksBtn.onclick = copySelectedLinks;
    if(dom.deleteAllBtn) dom.deleteAllBtn.onclick = deleteAllImages;
    if(dom.batchNoteTopBtn) dom.batchNoteTopBtn.onclick = () => batchNote('top');
    if(dom.batchNoteBottomBtn) dom.batchNoteBottomBtn.onclick = () => batchNote('bottom');
    if(dom.moveForwardBtn) dom.moveForwardBtn.onclick = moveForward;
    if(dom.moveBackwardBtn) dom.moveBackwardBtn.onclick = moveBackward;
    if(dom.moveToTopBtn) dom.moveToTopBtn.onclick = moveToTop;
    if(dom.moveToBottomBtn) dom.moveToBottomBtn.onclick = moveToBottom;
    
    document.querySelectorAll("#mainCatGroup .main-btn").forEach(btn=>{
      btn.onclick=()=>{
        document.querySelectorAll("#mainCatGroup .main-btn").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        nowMain=btn.dataset.val;
        nowSub="all";
        yardSubType=null;
        checkedGlobalIndices=[];
        updateYardSubBarVisibility();
        render();
      };
    });
    if(dom.styleSelect) dom.styleSelect.onchange=()=>{ nowSub=dom.styleSelect.value; if(nowMain !== 'yard') yardSubType=null; checkedGlobalIndices=[]; render(); };
    document.querySelectorAll(".yard-sub-btn").forEach(btn=>{
      btn.onclick=()=>{
        if(nowMain==='yard') {
          const subVal = btn.getAttribute("data-yard-sub");
          if(yardSubType === subVal) yardSubType = null;
          else yardSubType = subVal;
          checkedGlobalIndices=[];
          updateYardSubBarVisibility();
          render();
        }
      };
    });
    document.querySelectorAll(".layout-btn").forEach(btn=>{
      btn.onclick=()=>{
        document.querySelectorAll(".layout-btn").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");
        if(dom.gallery) dom.gallery.className=`gallery ${btn.dataset.layout}`;
      };
    });
    if(dom.doAddMain){
      dom.doAddMain.onclick=()=>{
        let v=dom.newMainVal.value.trim(), t=dom.newMainText.value.trim();
        if(!v||!t){ alert("标识和名称不能为空"); return; }
        let newBtn=document.createElement("button"); newBtn.className="main-btn"; newBtn.dataset.val=v; newBtn.textContent=t;
        dom.mainCatGroup.appendChild(newBtn);
        newBtn.onclick=()=>{ document.querySelectorAll("#mainCatGroup .main-btn").forEach(b=>b.classList.remove("active")); newBtn.classList.add("active"); nowMain=v; nowSub="all"; yardSubType=null; updateYardSubBarVisibility(); render(); };
        dom.newMainVal.value=""; dom.newMainText.value=""; syncSelects(); showTip("✓ 已添加一级分类");
      };
    }
    if(dom.doAddSub){
      dom.doAddSub.onclick=()=>{
        let v=dom.newSubVal.value.trim(), t=dom.newSubText.value.trim();
        if(!v||!t){ alert("标识和名称不能为空"); return; }
        let opt=document.createElement("option"); opt.value=v; opt.textContent=t;
        dom.styleSelect.appendChild(opt);
        dom.newSubVal.value=""; dom.newSubText.value=""; syncSelects(); showTip("✓ 已添加二级分类");
      };
    }
    if(dom.lightboxClose) dom.lightboxClose.onclick=closeLightbox;
    if(dom.prevBtn) dom.prevBtn.onclick=()=>switchImage(-1);
    if(dom.nextBtn) dom.nextBtn.onclick=()=>switchImage(1);
  }
  
  function init(){
    loadData();
    syncSelects();
    bindEvents();
    updateYardSubBarVisibility();
    render();
    initLightboxEvents();
  }
  init();
})();
</script>


</body></html>
